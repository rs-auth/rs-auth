services:
  postgres:
    image: postgres:16-alpine
    container_name: rs-auth-example-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rs_auth_example
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
